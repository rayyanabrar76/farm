<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 96" fill="none">
  <defs>
    <linearGradient id="agrl-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DA05E"/>
      <stop offset="100%" stop-color="#135120"/>
    </linearGradient>
    <linearGradient id="agrl-gd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD17A"/>
      <stop offset="100%" stop-color="#CC8300"/>
    </linearGradient>
  </defs>

  <!-- ── ICON MARK ── -->
  <!-- Outer glow ring -->
  <circle cx="48" cy="48" r="44" fill="none" stroke="#4CAF72" stroke-width="0.8" opacity="0.20"/>
  <!-- Badge circle -->
  <circle cx="48" cy="48" r="40" fill="url(#agrl-bg)"/>
  <!-- Inner ring -->
  <circle cx="48" cy="48" r="33" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

  <!-- Leaf outline -->
  <path d="M48 80 C22 72 17 26 48 12 C79 26 74 72 48 80Z"
        fill="rgba(255,255,255,0.08)"
        stroke="rgba(255,255,255,0.28)"
        stroke-width="1.5"/>
  <!-- Leaf central vein -->
  <line x1="48" y1="78" x2="48" y2="15"
        stroke="rgba(255,255,255,0.14)"
        stroke-width="1"
        stroke-dasharray="2 4"
        stroke-linecap="round"/>

  <!-- Y-network lines from hub (48,50) -->
  <line x1="48" y1="50" x2="48" y2="23" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>
  <line x1="48" y1="50" x2="31" y2="65" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>
  <line x1="48" y1="50" x2="65" y2="65" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.92"/>

  <!-- Gold nodes at tips -->
  <circle cx="48" cy="22" r="5.5" fill="url(#agrl-gd)"/>
  <circle cx="30" cy="66" r="5.5" fill="url(#agrl-gd)"/>
  <circle cx="66" cy="66" r="5.5" fill="url(#agrl-gd)"/>

  <!-- Hub white ring -->
  <circle cx="48" cy="50" r="9"   fill="white"/>
  <!-- Hub green centre -->
  <circle cx="48" cy="50" r="4.5" fill="url(#agrl-bg)"/>

  <!-- Leaf-tip dot -->
  <circle cx="48" cy="77" r="3" fill="rgba(255,255,255,0.38)"/>

  <!-- ── WORDMARK ── -->
  <text x="106" y="59"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="44"
    font-weight="800"
    letter-spacing="-2"
    fill="#1B5E28">Agro<tspan fill="#F5A623">lync</tspan></text>

  <!-- Tagline -->
  <text x="108" y="77"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
    font-size="10"
    font-weight="700"
    letter-spacing="4"
    fill="#4CAF72">FARM TO MARKET · AFRICA</text>
</svg>
